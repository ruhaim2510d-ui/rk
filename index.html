<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
margin:0;
font-family: Arial, sans-serif;
background-image: url(pexels-therato-15450042.jpg);
background-size: cover;
position: relative right: 100px;


}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
padding:30px 50px;
;
 
}

.logo{
color:white;
font-size:24px;

}

.nav-links{
list-style:none;
display:flex;

}

.nav-links li{

}

.nav-links a{
text-decoration:none;
color:white;
font-size:18px;
padding:8px 12px;
transition:0.3s;
}

.nav-links a:hover{
background:#ff4d4d;
border-radius:5px;
}


</style>
<body>
 <nav class="navbar">
  <div class="logo"></div>

  <ul class="nav-links">

  </ul>
</nav>
</body>
</html>
